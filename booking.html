<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .booking-layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem;
    }
    .tier-btn {
      padding: 1rem;
      border: 3px solid var(--border-glass);
      border-radius: 50px;
      background: transparent;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .tier-btn.selected {
      background: rgba(0, 245, 255, 0.15);
      border-color: var(--accent-cyan);
    }
    .summary-box {
      background: rgba(0,0,0,0.05);
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 2rem;
      border-left: 4px solid var(--accent-cyan);
    }
      </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem; text-decoration: none;">&larr; Cancel</a>
        <div class="logo"><span class="text-gradient">Makank</span></div>
      </div>
      <div class="nav-links">
        <span style="color: var(--text-secondary); font-size: 0.9rem;">Secure Checkout</span>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="glass booking-layout animate fade-in" style="margin-top: 4rem;">
      <h2 style="margin-bottom: 0.5rem;">Configure <span class="text-gradient">Booking</span></h2>
      <p id="eventTitleDisplay" style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 3rem;">Loading...</p>

      <form id="bookingForm">
        
        <div style="margin-bottom: 3rem;">
          <h3 style="margin-bottom: 1rem;">1. Select Ticket Tier</h3>
          <button type="button" class="tier-btn selected" onclick="selectTier(this, 'Regular', 60)">
            <span>Regular</span> <strong>$60</strong>
          </button>
          <button type="button" class="tier-btn" onclick="selectTier(this, 'Premium', 150)">
            <span>Premium</span> <strong>$150</strong>
          </button>
          <button type="button" class="tier-btn" onclick="selectTier(this, 'VIP', 350)">
            <span>VIP</span> <strong>$350</strong>
          </button>
        </div>
