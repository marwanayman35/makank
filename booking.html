<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .booking-layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem;
    }
    .tier-btn {
      padding: 1rem;
      border: 3px solid var(--border-glass);
      border-radius: 50px;
      background: transparent;
      color: black;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .tier-btn.selected {
      background: rgba(0, 245, 255, 0.15);
      border-color: var(--accent-cyan);
    }
    .summary-box {
      background: rgba(0,0,0,0.05);
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 2rem;
      border-left: 4px solid var(--accent-cyan);
    }
