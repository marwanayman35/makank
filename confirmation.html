<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmed - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .confirm-layout {
      max-width: 600px;
      margin: 4rem auto;
      text-align: center;
    }
    .check-circle {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem auto;
      font-size: 2.5rem;
      color: black;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}
.ticket-stub {
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
  border: 1px dashed rgba(255,255,255,0.3);
  padding: 1.5rem;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  overflow: hidden;
  margin-top: 2rem;
  text-align: left;
}
.ticket-stub::after {
  content: '';
  position: absolute;
  right: -15px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px;
  height: 30px;
  background: var(--bg-dark);
  border-radius: 50%;
  border-left: 1px dashed rgba(255,255,255,0.3);
}
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div class="logo">
        <span class="text-gradient">Makank</span>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>
