<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmed - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .confirm-layout {
      max-width: 600px;
      margin: 4rem auto;
      text-align: center;
    }
    .check-circle {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem auto;
      font-size: 2.5rem;
      color: black;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
