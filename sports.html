<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .matches-container {
      max-width: 1000px;
      margin: 3rem auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .match-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex;
      flex-direction: column;
    }
    .match-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      border-color: rgba(0, 245, 255, 0.5);
    }
    .match-main {
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: 2fr 1.2fr 1.2fr auto;
      align-items: center;
      gap: 1.5rem;
    }
    @media (max-width: 900px) {
      .match-main { grid-template-columns: 1fr; gap: 1.5rem; }
      .match-footer { flex-wrap: wrap; gap: 1rem; }
    }
    .team-logos { display: flex; align-items: center; margin-right: 1.2rem; }
    .team-logo {
      width: 55px; height: 55px; border-radius: 50%; background: white; padding: 6px;
      border: 2px solid var(--accent-cyan); box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: contain;
    } .team-logo:last-child { margin-left: -20px; border-color: var(--accent-purple); }
 .team-names { font-size: 1.2rem; font-weight: 700; }
 .vs-text { color: var(--text-secondary); font-size: 0.85rem; margin: 0 0.5rem; font-weight: 400; }
 .match-info-block { display: flex; align-items: center; gap: 0.8rem; }
 .info-icon svg { width: 24px; height: 24px; stroke: var(--accent-cyan); }
 .info-text { display: flex; flex-direction: column; }
 .info-label { font-weight: bold; font-size: 1rem; }
 .info-sub { color: var(--text-secondary); font-size: 0.85rem; }
 .btn-status { padding: 0.8rem 2rem; border-radius: 50px; font-weight: bold; text-align: center; min-width: 160px; }
 .btn-available { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: #fff; border: none; cursor: pointer; font-size: 1rem; transition: all 0.3s; }
 .btn-available:hover { box-shadow: 0 0 15px rgba(0, 245, 255, 0.4); transform: scale(1.05); }
 .btn-disabled { background: rgba(0, 140, 150, 0.15); color: var(--accent-cyan); border: 1px solid rgba(0, 245, 255, 0.3); pointer-events: none; font-size: 1rem; }
 .match-footer {
   padding: 1rem 2rem; background: rgba(255, 255, 255, 0.08);
   border-top: 1px solid rgba(255, 255, 255, 0.05);
   border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
   display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.85rem;
 }
     .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot-red { background: var(--error); box-shadow: 0 0 8px var(--error); }
  </style>
</head>
