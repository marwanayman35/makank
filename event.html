<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Events - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .events-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 2rem;
      align-items: start;
    }
    .filters-sidebar {
      position: sticky;
      top: 100px;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group select, .filter-group input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-glass);
      color: white;
      padding: 0.8rem;
      border-radius: 6px;
      outline: none;
    }
    .filter-group input::placeholder {
      color: rgba(255, 255, 255, 0.9);
    }
    .events-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .event-card-horizontal {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      transition: all var(--transition-normal);
      align-items: center;
    }
    .event-card-horizontal:hover {
      background: var(--bg-glass-hover);
      border-color: var(--accent-cyan);
      transform: translateX(5px);
    }
    .event-image {
      width: 150px;
      height: 100px;
      border-radius: 8px;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--border-glass);
    }
    .event-details-content {
      flex: 1;
    }
    @media (max-width: 768px) {
      .events-layout {
        grid-template-columns: 1fr;
      }
      .event-card-horizontal {
        flex-direction: column;
        align-items: stretch;
      }
      .event-image {
        width: 100%;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button onclick="history.back();" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem;">&larr; Back</button>
        <div class="logo"><span class="text-gradient">Makank</span></div>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html" class="active">Browse Events</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="container" style="margin-top: 2rem;">
    <h1 style="margin-bottom: 2rem;">Discover <span class="text-gradient">Entertainment</span></h1>

    <div class="events-layout animate fade-in">
      <!-- Filters Sidebar -->
      <aside class="filters-sidebar glass" style="padding: 1.5rem;">
        <h3>Filters</h3>
        <hr style="border-color: var(--border-glass); margin: 1rem 0;">
        
        <div class="filter-group">
          <label>Search Query</label>
          <input type="text" id="filterSearch" placeholder="Search names...">
        </div>

        <div class="filter-group" style="display: none;">
          <label>Event Type</label>
          <select id="filterType">
            <option value="concert">Concerts</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Location / Venue</label>
          <input type="text" id="filterLocation" placeholder="City or stadium...">
        </div>

        <div class="filter-group">
          <label>Sort By</label>
          <select id="filterSort">
            <option value="date-asc">Date (Earliest First)</option>
            <option value="date-desc">Date (Latest First)</option>
            <option value="name-asc">Name (A-Z)</option>
          </select>
        </div>

        <button class="btn btn-primary" style="width: 100%;" onclick="applyFilters()">Apply Filters</button>
      </aside>

      <!-- Events Listing -->
      <section class="events-grid" id="eventsListContainer" style="margin-top: 0 !important; padding-top: 0 !important;">
        <!-- Rendered by JS -->
      </section>
    </div>
  </main>

  <footer style="margin-top: 4rem;">
    <div class="container">
      <p>&copy; 2026 Makank. Created for premium experiences.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Pre-fill search if navigating from home page search bar
      const urlParams = new URLSearchParams(window.location.search);
      const q = urlParams.get('q');
      if (q) {
        document.getElementById('filterSearch').value = q;
      }
      const t = urlParams.get('type');
      
      // Hide Event Type filter and hardcode to concert
      const typeSelect = document.getElementById('filterType');

      if (t && t !== 'football') {
        typeSelect.value = t;
      } else {
        typeSelect.value = 'concert';
      }

      applyFilters();
    });
