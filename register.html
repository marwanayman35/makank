<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      max-width: 500px;
      margin: 4rem auto;
      padding: 3rem;
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div class="logo">
        <span class="text-gradient">Makank</span>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html">Browse Events</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="active">Register</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="glass auth-container animate fade-in">
      <h2 class="text-center" style="margin-bottom: 2rem;">Create an <span class="text-gradient">Account</span></h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullname" placeholder="Ahmed Abdalla">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="grid grid-2" style="gap: 1rem;">
          <div class="form-group">
            <label>Password</label>
            <div class="password-container">
              <input type="password" id="password" placeholder="Create password">
              <img src="https://cdn-icons-png.flaticon.com/512/159/159604.png" alt="Show Password" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-container">
              <input type="password" id="confirmPassword" placeholder="Confirm password">
              <img src="https://cdn-icons-png.flaticon.com/512/159/159604.png" alt="Show Password" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
      </form>
      <p class="text-center" style="margin-top: 2rem; font-size: 0.9rem;">
        Already have an account? <a href="login.html" style="color: var(--accent-cyan); font-weight: 600;">Log in here</a>
      </p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Makank. Created for premium experiences.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function togglePasswordVisibility(inputId, iconEl) {
      const input = document.getElementById(inputId);
      const showIcon = "https://cdn-icons-png.flaticon.com/512/159/159604.png";
      const hideIcon = "https://cdn-icons-png.flaticon.com/512/565/565655.png";
      if (input.type === "password") {
        input.type = "text"; iconEl.src = hideIcon;
      } else {
        input.type = "password"; iconEl.src = showIcon;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.setupFormValidation('registerForm', {
        fullname: { required: true, type: 'name' },
        email: { required: true, type: 'email' },
        password: { required: true, minLength: 6 },
        confirmPassword: { required: true, match: 'password' }
      }, (form) => {
        // Mock Registration Logic
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        let users = JSON.parse(AppStorage.getItem('makank_users')) || [];
        
        // Check if email exists
        const emailInput = document.getElementById('email');
        if (users.find(u => u.email === email)) {
          window.showError(emailInput, 'An account with this email already exists');
          return;
        }

        const newUser = {
          id: 'USR-' + Math.floor(1000 + Math.random() * 9000),
          name: fullname,
          email: email,
          password: password,
          created: new Date().toISOString().split('T')[0]
        };

        users.push(newUser);
        AppStorage.setItem('makank_users', JSON.stringify(users));

        window.showToast('Registration successful! Redirecting to login...');
        setTimeout(() => window.location.href = 'login.html', 1500);
      });
    });
  </script>
</body>
</html>
