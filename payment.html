<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .payment-layout {
      max-width: 600px;
      margin: 4rem auto;
      padding: 3rem;
    }
    .payment-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-glass);
    }
    .payment-tab {
      padding: 1rem 2rem;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .payment-tab.active {
      color: black;
      border-color: var(--accent-cyan);
      font-weight: bold;
    }
    .lock-icon {
      font-size: 0.8rem;
      margin-right: 0.5rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem; text-decoration: none;">&larr; Back</a>
        <div class="logo"><span class="text-gradient">Makank</span></div>
      </div>
      <div class="nav-links">
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="glass payment-layout animate fade-in">
      <h2 style="margin-bottom: 0.5rem;">Secure <span class="text-gradient">Payment</span></h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Total Amount: <strong id="payTotal" style="color: black; font-size: 1.5rem; margin-left: 0.5rem;">0 EGP</strong></p>

      <div class="payment-tabs">
        <div class="payment-tab active" id="tabCard">Credit Card</div>
      </div>

      <form id="paymentForm">
        <div class="form-group">
          <label>Name on Card</label>
          <input type="text" id="ccName" placeholder="Cardholder Name">
        </div>
        <div class="form-group">
          <label>Account Verification Email</label>
          <input type="email" id="ccEmail" placeholder="Your registered account email">
        </div>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="ccNumber" placeholder="0000 0000 0000 0000" maxlength="16">
        </div>
        <div class="grid grid-2" style="gap: 1rem;">
          <div class="form-group">
            <label>Expiry Date</label>
            <input type="text" id="ccExp" placeholder="MM/YY" maxlength="5">
          </div>
          <div class="form-group">
            <label>CVC / CVV</label>
            <!-- Simulate Password toggle just for security vibe -->
            <div class="password-container">
              <input type="password" id="ccCVC" placeholder="123" maxlength="3">
              <img src="https://cdn-icons-png.flaticon.com/512/159/159604.png" alt="Show" class="toggle-password" onclick="togglePasswordVisibility('ccCVC', this)">
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1.2rem; font-size: 1.1rem;">
          Pay Now
        </button>
      </form>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    function togglePasswordVisibility(inputId, iconEl) {
      const input = document.getElementById(inputId);
      const showIcon = "https://cdn-icons-png.flaticon.com/512/159/159604.png";
      const hideIcon = "https://cdn-icons-png.flaticon.com/512/565/565655.png";
      if (input.type === "password") {
        input.type = "text"; iconEl.src = hideIcon;
      } else {
        input.type = "password"; iconEl.src = showIcon;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Authentication check
      if (!AppStorage.getItem('loggedInUser')) {
        window.location.href = 'login.html';
        return;
      }

      const sessionStr = AppStorage.getItem('checkoutSession');
      if (!sessionStr) {
        window.location.href = 'categories.html';
        return;
      }
      
      const session = JSON.parse(sessionStr);
      document.getElementById('payTotal').textContent = `${session.total} EGP`;

      // Auto-format Expiry Date
      document.getElementById('ccExp').addEventListener('input', function (e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 2) {
          val = val.substring(0, 2) + '/' + val.substring(2, 4);
        }
        e.target.value = val;
      });

      window.setupFormValidation('paymentForm', {
        ccName: { required: true, type: 'name', customMessage: "Cardholder name is required and should only contain letters." },
        ccEmail: { required: true, type: 'email' },
        ccNumber: { required: true, type: 'numeric', minLength: 16, customMessage: "Card number must be exactly 16 digits." },
        ccExp: { required: true, type: 'expiry', minLength: 5, customMessage: "Format MM/YY required and must be in the future." },
        ccCVC: { required: true, type: 'numeric', minLength: 3, customMessage: "3-digit CVV required." }
      }, (form) => {
        
        // Finalize purchase - store it in User array if logged in, otherwise just push to confirmation
        const users = JSON.parse(AppStorage.getItem('makank_users')) || [];
        const activeUserStr = AppStorage.getItem('loggedInUser');
        
        if (!activeUserStr) {
           window.showToast('Session expired. Please log in again.', 'error');
           setTimeout(() => window.location.href = 'login.html', 1500);
           return;
        }

        const activeUser = JSON.parse(activeUserStr);
        const enteredName = document.getElementById('ccName').value.trim();
        const enteredEmail = document.getElementById('ccEmail').value.trim();

        // Strict Account Validation
        let hasMismatch = false;
        if (enteredEmail.toLowerCase() !== (activeUser.email || '').toLowerCase()) {
           window.showError(document.getElementById('ccEmail'), 'Email must exactly match your registered account email.');
           hasMismatch = true;
        }
        if (hasMismatch) return;

        // Create Mock Ticket Object
        const ticket = {
           ticketId: 'TKT-' + Math.floor(10000 + Math.random() * 90000),
           event: session.eventName,
           date: session.eventDate,
           venue: session.venue,
           tier: session.tier,
           qty: session.quantity,
           total: session.total,
           purchasedOn: new Date().toISOString().split('T')[0]
        };

        if (activeUserStr) {
           const activeUser = JSON.parse(activeUserStr);
           // Sync ticket to the master list
           const userIndex = users.findIndex(u => u.email === activeUser.email);
           if (userIndex > -1) {
              if(!users[userIndex].tickets) users[userIndex].tickets = [];
              users[userIndex].tickets.push(ticket);
              AppStorage.setItem('makank_users', JSON.stringify(users));
              
              // update local active state
              activeUser.tickets = users[userIndex].tickets;
              AppStorage.setItem('loggedInUser', JSON.stringify(activeUser));
           } else {
              // Graceful fallback for mock sessions
              if(!activeUser.tickets) activeUser.tickets = [];
              activeUser.tickets.push(ticket);
              AppStorage.setItem('loggedInUser', JSON.stringify(activeUser));
           }
        }
        
        // Add exact generated ticket ID to session so Confirmation page sees it
        session.issuedTicketId = ticket.ticketId;
        AppStorage.setItem('checkoutSession', JSON.stringify(session));

        window.location.href = 'confirmation.html';
      });
    });
  </script>
</body>
</html>
