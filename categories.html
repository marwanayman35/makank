<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Category - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem; text-decoration: none;">&larr; Back</a>
        <div class="logo"><span class="text-gradient">Makank</span></div>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html" class="active">Browse Events</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>
   <main class="container" style="margin-top: 4rem; text-align: center; min-height: 60vh; display: flex; flex-direction: column; justify-content: center;">
   <h1 style="margin-bottom: 3rem;">Choose Your <span class="text-gradient">Experience</span></h1>
   
   <div class="grid grid-2" style="gap: 3rem; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
     
     <!-- Sports Category -->
     <a href="sports.html" class="glass animate fade-in delay-1" style="display: block; text-decoration: none; overflow: hidden; border-radius: 24px; transition: transform 0.3s, border-color 0.3s; border: 2px solid transparent;">
       <div style="background: url('assets/images/football.png') center/cover; width: 100%; aspect-ratio: 16/10;"></div>
       <div style="padding: 2rem; text-align: center;">
         <h2 style="margin-bottom: 0.5rem; color: var(--text-primary); font-size: 2.2rem;">Sports</h2>
         <p style="color: var(--text-secondary); font-size: 1.1rem;">Get tickets for the most electrifying football matches.</p>
         <div class="btn btn-primary" style="margin-top: 1.5rem; width: 80%; text-align: center; padding: 1rem;">View Matches</div>
       </div>
     </a>

     <!-- Entertainment Category -->
     <a href="events.html" class="glass animate fade-in delay-2" style="display: block; text-decoration: none; overflow: hidden; border-radius: 24px; transition: transform 0.3s, border-color 0.3s; border: 2px solid transparent;">
       <div style="background: url('assets/images/concert.jpg') center/cover; width: 100%; aspect-ratio: 16/10;"></div>
       <div style="padding: 2rem; text-align: center;">
         <h2 style="margin-bottom: 0.5rem; color: var(--text-primary); font-size: 2.2rem;">Entertainment</h2>
         <p style="color: var(--text-secondary); font-size: 1.1rem;">Book legendary concerts and exclusive festivals.</p>
         <div class="btn btn-primary" style="margin-top: 1.5rem; width: 80%; text-align: center; padding: 1rem;">Explore Events</div>
       </div>
     </a>

   </div>
 </main>
   <footer style="margin-top: auto; padding-top: 4rem;">
    <div class="container">
      <p>&copy; 2026 Makank. Created for premium experiences.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <style>
    .glass:hover {
      border-color: var(--accent-cyan) !important;
      transform: translateY(-10px);
    }
  </style>
</body>
</html>
