<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Makank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .ticket-stub {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      padding: 1.5rem;
      border-radius: 30px;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .profile-card {
      padding: 2rem;
    }
    .sidebar a {
      border-radius: 50px;
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <nav>
    <div class="container">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button onclick="history.back();" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem;">&larr; Back</button>
        <div class="logo"><span class="text-gradient">Makank</span></div>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html">Browse Events</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section>
      <div class="animate">
        <h1 id="userGreeting">Welcome back</h1>
        <p>Manage your tickets and account settings here.</p>
      </div>

      <div class="dashboard-layout mt-4" style="margin-top: 3rem;">
        
        <!-- Sidebar Navigation -->
        <div class="sidebar glass animate delay-1" style="padding: 1.5rem; height: fit-content;">
          <a href="#" class="active" onclick="switchTab('ticketsTab')">My Tickets</a>
          <a href="#" onclick="switchTab('profileTab')">Profile Settings</a>
          <a href="#" onclick="logoutUser()">Logout</a>
        </div>

        <!-- Main Content Area -->
        <div class="content flex-1 animate delay-2">
          
          <!-- Tab: My Tickets -->
          <div id="ticketsTab">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
               <h2>My Booked Events</h2>
               <a href="categories.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">Book More</a>
            </div>
            
            <div id="ticketsContainer">
              <!-- Rendered by JS -->
            </div>
          </div>

          <!-- Tab: Profile Settings -->
          <div id="profileTab" class="glass" style="display: none; width: 100%; max-width: 800px; padding: 2.5rem;">
            <h2 style="margin-bottom: 2rem;">Update Profile</h2>
            <form id="profileForm">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullname" value="">
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" value="">
              </div>
              <div class="form-group" style="margin-bottom: 0.5rem;">
                <label>New Password (Optional)</label>
                <input type="password" id="newPassword" placeholder="Enter a new password to change it">
              </div>
              <div class="form-group" style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Makank. Created for premium experiences.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>

  <script>
        document.addEventListener('DOMContentLoaded', () => {
      const loggedInUserStr = AppStorage.getItem('loggedInUser');
      if (!loggedInUserStr) {
        window.location.href = 'login.html';
        return;
      }
      let loggedInUser = JSON.parse(loggedInUserStr);
      
      // Sync fresh data from global database so admin-ticket cancellations apply immediately to active session
      const users = JSON.parse(AppStorage.getItem('makank_users')) || [];
      const freshUserMatch = users.find(u => u.email === loggedInUser.email);
      if (freshUserMatch) {
         loggedInUser = freshUserMatch;
         AppStorage.setItem('loggedInUser', JSON.stringify(loggedInUser));
      }
      
      // Update greeting with user's name
      document.getElementById('userGreeting').innerHTML = `Welcome back, <span class="text-gradient">${loggedInUser.name}</span>!`;
      
      // Fill the profile form fields
      document.getElementById('fullname').value = loggedInUser.name;
      document.getElementById('email').value = loggedInUser.email || '';

      // Render tickets dynamically
      renderUserTickets(loggedInUser);

      // Listen for profile changes
      window.setupFormValidation('profileForm', {
        fullname: { required: true, minLength: 3, type: 'name' },
        email: { required: true, type: 'email' }
      }, (form) => {
        const newName = document.getElementById('fullname').value.trim();
        const newEmail = document.getElementById('email').value.trim();
        const newPass = document.getElementById('newPassword').value;

        // Update local state
        loggedInUser.name = newName;
        loggedInUser.email = newEmail;
        if (newPass.length > 0) {
          loggedInUser.password = newPass;
        }

        AppStorage.setItem('loggedInUser', JSON.stringify(loggedInUser));

        // Sync to global users array
        const users = JSON.parse(AppStorage.getItem('makank_users')) || [];
        // Determine search base (email can change so we reference id or previous email)
        const userIndex = users.findIndex(u => (u.id === loggedInUser.id) || (u.email === JSON.parse(loggedInUserStr).email));
        
        if (userIndex > -1) {
          users[userIndex].name = newName;
          users[userIndex].email = newEmail;
          if (newPass.length > 0) users[userIndex].password = newPass;
          AppStorage.setItem('makank_users', JSON.stringify(users));
        }

        // Update UI
        document.getElementById('userGreeting').innerHTML = `Welcome back, <span class="text-gradient">${newName}</span>!`;
        window.showToast('Profile settings saved successfully!', 'success');
        document.getElementById('newPassword').value = ''; // clear password field
      });
    });

    function renderUserTickets(user) {
      const container = document.getElementById('ticketsContainer');
      if (!user.tickets || user.tickets.length === 0) {
        container.innerHTML = `
          <div style="background: rgba(255,255,255,0.02); padding: 3rem; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1); text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">🎟️</div>
            <h3 style="margin-bottom: 0.5rem; color: var(--text-secondary);">No Tickets Booked Yet</h3>
            <p style="color: rgba(255,255,255,0.4); margin-bottom: 1.5rem;">When you secure your spot at an event, your tickets will appear here.</p>
            <a href="categories.html" class="btn btn-secondary" style="padding: 0.8rem 1.5rem; display: inline-block;">Browse Upcoming Events</a>
          </div>`;
        return;
      }

      container.innerHTML = '';
      
      // Dynamic verification fallback: ensure tickets don't map to events that were deleted before the admin hooks were added
      const activeEvents = JSON.parse(AppStorage.getItem('makank_events')) || [];
      const activeMatches = JSON.parse(AppStorage.getItem('makank_matches')) || [];
      const isEventActive = (name) => {
         return activeEvents.some(e => e.name === name) || activeMatches.some(m => `${m.homeTeam} vs ${m.awayTeam}` === name);
      };

      user.tickets.forEach(ticket => {
        const isCancelled = ticket.status === 'cancelled' || !isEventActive(ticket.event);
        const opacityStyle = isCancelled ? 'opacity: 0.5; filter: grayscale(1);' : '';
        const borderStyle = isCancelled ? 'border-color: rgba(255, 0, 0, 0.5);' : 'border-color: rgba(0, 245, 255, 0.5);';
        const cancelBadge = isCancelled ? `<div style="position: absolute; top: 1rem; right: 1rem; background: var(--error); color: white; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">Cancelled</div>` : '';
        const titleColor = isCancelled ? 'color: var(--text-secondary); text-decoration: line-through;' : 'color: var(--accent-cyan);';

        container.innerHTML += `
          <div class="ticket-stub" style="background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); border: 3px solid transparent; ${borderStyle} padding: 1.5rem; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; margin-bottom: 1.5rem; transition: transform 0.3s, border-color 0.3s; cursor: pointer; ${opacityStyle}">
            ${cancelBadge}
            <div style="flex: 1;">
              <h3 style="${titleColor} font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">${ticket.event}</h3>
              <div style="display: flex; gap: 1.5rem; margin-bottom: 1rem; align-items: center;">
                <div style="display: flex; flex-direction: column;">
                  <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Date</span>
                  <span style="font-weight: bold; font-size: 0.95rem;">${ticket.date}</span>
                </div>
                <div style="height: 30px; width: 1px; background: rgba(255,255,255,0.1);"></div>
                <div style="display: flex; flex-direction: column;">
                  <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Venue</span>
                  <span style="font-weight: bold; font-size: 0.95rem;">${ticket.venue}</span>
                </div>
              </div>
              <div style="display: flex; gap: 1rem;">
                <span style="background: rgba(255,255,255,0.1); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600;">Section: ${ticket.tier}</span>
                <span style="background: rgba(255,255,255,0.1); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600;">Qty: ${ticket.qty}</span>
                <span style="background: rgba(0, 245, 255, 0.1); color: var(--accent-cyan); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: bold;">ID: ${ticket.ticketId}</span>
              </div>
            </div>
          </div>
        `;
      });
    }

    function logoutUser() {
      AppStorage.removeItem('loggedInUser');
      window.location.href = 'login.html';
    }

    function switchTab(tabId) {
      document.getElementById('ticketsTab').style.display = 'none';
      document.getElementById('profileTab').style.display = 'none';
      
      const links = document.querySelectorAll('.sidebar a');
      links.forEach(l => l.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById(tabId).style.display = 'block';
    }
  </script>
</body>
</html>
