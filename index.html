!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makank - Premium Event Booking</title>
  <meta name="description" content="Book tickets for the most anticipated football matches and concerts with Makank. Premium secure booking.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-blobs"></div>

  <!-- Navigation -->
  <nav>
    <div class="container">
      <div class="logo">
        <span class="text-gradient">Makank</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="categories.html">Browse Events</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main>
    <!-- Hero Section -->
    <section class="hero container">
      <div class="hero-content animate delay-1" style="max-width: 580px;">
        <h1>Find Your <span class="text-gradient">Next Ticket</span>.</h1>
        <p>Your exclusive pass to the best live events in Egypt. Book tickets for top local football matches and legendary concerts today.</p>
        <form action="events.html" method="GET" style="display: flex; gap: 1rem; margin-top: 2rem; background: rgba(255, 255, 255, 0.95); padding: 0.5rem 0.5rem 0.5rem 1.5rem; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
          <input type="text" name="q" placeholder="Search events, artists..." style="flex: 1; border: none; background: transparent; color: black; font-weight: 500; font-size: 1.1rem; outline: none;">
          <button type="submit" class="btn btn-primary" style="border-radius: 50px; padding: 0.8rem 2rem;">Search</button>
        </form>
      </div>
      <div class="hero-image animate delay-2">
        <img src="assets/hero section main.png" alt="Hero Visual" style="width: 110%; max-width: 900px; height: auto; filter: drop-shadow(0 24px 48px rgba(0,0,0,0.18)); transform: translateY(-20px); margin-left: 80px;">
      </div>
    </section>
